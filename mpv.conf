# ===================================================================
# VIDEO & RENDERING
# ===================================================================
profile=high-quality         # Built-in profile for better upscaling and rendering
vo=gpu-next                  # Modern, highly efficient video output renderer
hwdec=auto-safe              # Enable hardware decoding to save battery/CPU

# ===================================================================
# PLAYER BEHAVIOR
# ===================================================================
keep-open=yes                # Keep the player open after the video finishes
save-position-on-quit=yes    # Resume video exactly where you left off
osd-duration=2000            # Keep on-screen display messages visible for 2 seconds

# ===================================================================
# AUDIO & VOLUME
# ===================================================================
volume=100                   # Default startup volume
volume-max=150               # Allow boosting volume up to 150% for quiet files
audio-pitch-correction=yes   # Keep voices sounding normal when speeding up video

# ===================================================================
# SUBTITLES & OSD (On-Screen Display)
# ===================================================================
slang=en,eng                 # Prefer English subtitles automatically
alang=en,eng,ja,jpn          # Prefer English or Japanese audio
sub-auto=fuzzy               # Load all subtitle files in the same folder
sub-font-size=40             # Clean, readable subtitle size
sub-color="#FFFFFFFF"        # White text
sub-border-color="#FF000000" # Black border
sub-border-size=2.0          # Thick border so it's readable on white backgrounds
sub-shadow-offset=1          # Slight shadow for depth
sub-margin-y=40              # Push subtitles slightly higher from the bottom edge
