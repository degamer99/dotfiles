# ===================================================================
# BASE ARROWS (Standard Navigation & Volume)
# ===================================================================
RIGHT       seek  5          # Forward 5 seconds
LEFT        seek -5          # Backward 5 seconds
UP          add volume  5    # Volume up 5%
DOWN        add volume -5    # Volume down 5%

# ===================================================================
# SHIFT + ARROWS (Micro / Fine Adjustments)
# ===================================================================
Shift+RIGHT seek  1 exact    # Forward 1 exact second (useful for pausing on exact frames)
Shift+LEFT  seek -1 exact    # Backward 1 exact second
Shift+UP    add volume  1    # Volume up 1%
Shift+DOWN  add volume -1    # Volume down 1%

# ===================================================================
# CTRL + ARROWS (Macro / Speed Adjustments)
# ===================================================================
Ctrl+RIGHT  seek  60         # Forward 1 minute
Ctrl+LEFT   seek -60         # Backward 1 minute
Ctrl+UP     add speed  0.1   # Increase playback speed (e.g., 1.0x to 1.1x)
Ctrl+DOWN   add speed -0.1   # Decrease playback speed

# ===================================================================
# ALT + ARROWS (Sync / Delay Corrections)
# ===================================================================
Alt+RIGHT   add sub-delay  0.1   # Delay subtitles by 100ms (if they appear too early)
Alt+LEFT    add sub-delay -0.1   # Hasten subtitles by 100ms (if they appear too late)
Alt+UP      add audio-delay  0.1 # Delay audio by 100ms 
Alt+DOWN    add audio-delay -0.1 # Hasten audio by 100ms

# ===================================================================
# HANDY QUALITY-OF-LIFE SHORTCUTS
# ===================================================================
BS          set speed 1.0    # Backspace resets playback speed to normal
ENTER       cycle fullscreen # Enter toggles fullscreen
WHEEL_UP    add volume  5    # Mouse wheel up = volume up
WHEEL_DOWN  add volume -5    # Mouse wheel down = volume down
MBTN_LEFT_DBL cycle fullscreen # Double-click left mouse toggles fullscreen
